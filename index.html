    async function fetchMessages(friendId, limitRows = CHAT_FETCH_ROWS) {
      const orFilter = `and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`;
      const { data, error } = await supabase
        .from("messages")
        .select("id, sender_id, receiver_id, content, message_type, media_data, latitude, longitude, created_at, read_at")
        .or(orFilter)
        .order("created_at", { ascending: false })
        .order("id", { ascending: false })
        .limit(limitRows);
      assertNoDbError(error, "Fetch messages failed");
      return (data || []).slice().reverse();
    }

    async function trimMessagesForFreeTier() {
      const { count, error } = await supabase.from("messages").select("id", { count: "exact", head: true });
      assertNoDbError(error, "Trim messages failed");
      const total = Number(count || 0);
      if (total < MAX_MESSAGE_ROWS) return;

      const removeCount = total - (MAX_MESSAGE_ROWS - 1);
      if (removeCount <= 0) return;

      const { data: oldRows, error: oldError } = await supabase
        .from("messages")
        .select("id")
        .order("created_at", { ascending: true })
        .order("id", { ascending: true })
        .limit(removeCount);
      assertNoDbError(oldError, "Trim messages failed");
      const ids = (oldRows || []).map((r) => Number(r.id));
      if (!ids.length) return;
      const { error: delError } = await supabase.from("messages").delete().in("id", ids);
      assertNoDbError(delError, "Trim messages failed");
    }

    async function trimConversationMessages(friendId, keepCount = 20) {
      const orFilter = `and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`;
      const { data: toDeleteRows, error } = await supabase
        .from("messages")
        .select("id")
        .or(orFilter)
        .order("created_at", { ascending: false })
        .order("id", { ascending: false })
        .range(keepCount, keepCount + 5000);
      assertNoDbError(error, "Trim conversation failed");
      const ids = (toDeleteRows || []).map((r) => Number(r.id));
      if (!ids.length) return;
      const { error: delError } = await supabase.from("messages").delete().in("id", ids);
      assertNoDbError(delError, "Trim conversation failed");
    }

    async function markRead(friendId) {
      const { data: updated, error } = await supabase
        .from("messages")
        .update({ read_at: new Date().toISOString() })
        .eq("sender_id", friendId)
        .eq("receiver_id", currentUser.id)
        .is("read_at", null)
        .select("id");
      assertNoDbError(error, "Mark read failed");

      if (updated.length > 0) {
        await trimConversationMessages(friendId, 20);
      }
    }

    async function sendMessage(friendId, payload) {
      const data = (typeof payload === "string")
        ? { content: payload, messageType: "text", mediaData: null, latitude: null, longitude: null }
        : {
            content: payload?.content || "",
            messageType: payload?.messageType || "text",
            mediaData: payload?.mediaData || null,
            latitude: payload?.latitude ?? null,
            longitude: payload?.longitude ?? null,
          };

      try {
        await updatePresence();
      } catch {}

      try {
        await trimMessagesForFreeTier();
      } catch {}

      const { error } = await supabase.from("messages").insert({
        sender_id: currentUser.id,
        receiver_id: friendId,
        content: data.content,
        message_type: data.messageType,
        media_data: data.mediaData,
        latitude: data.latitude,
        longitude: data.longitude,
        created_at: new Date().toISOString(),
      });
      assertNoDbError(error, "Send message failed");
    }

              <span class="muted">@${f.username}</span>

    function renderMessages(rows) {
      if (!selectedFriend) {
        const emptyHtml = `<div class="empty-state">${t("selectFriendToChat")}</div>`;
        if (els.chatList.innerHTML !== emptyHtml) {
          els.chatList.innerHTML = emptyHtml;
        }
        lastMessagesRenderKey = "__no_selected__";
        return;
      }

      const friendId = Number(selectedFriend.id);
      const pending = getPendingMessages(friendId);
      const mergedRows = [...rows, ...pending];
      const latestReadMineId = mergedRows.reduce((latestId, message) => {
        if (message._pending) return latestId;
        if (Number(message.sender_id) !== Number(currentUser.id)) return latestId;
        if (!message.read_at) return latestId;
        return Number(message.id) > latestId ? Number(message.id) : latestId;
      }, 0);

      if (!mergedRows.length) {
        if (isConversationLoading) {
          const loadingHtml = `<div class="empty-state">${t("loadingMessages")}</div>`;
          if (els.chatList.innerHTML !== loadingHtml) {
            els.chatList.innerHTML = loadingHtml;
          }
          lastMessagesRenderKey = "__loading_messages__";
          return;
        }

        const emptyHtml = `<div class="empty-state">${t("noMessages")}</div>`;
        if (els.chatList.innerHTML !== emptyHtml) {
          els.chatList.innerHTML = emptyHtml;
        }
        lastMessagesRenderKey = "__no_messages__";
        return;
      }

      const renderKey = mergedRows.map((m) => `${m.id}|${m.sender_id}|${m.receiver_id}|${m.message_type || "text"}|${m.content}|${m.media_data || ""}|${m.latitude || ""}|${m.longitude || ""}|${m.created_at}|${m.read_at || ""}|${m._pending ? 1 : 0}`).join("||");
      if (renderKey === lastMessagesRenderKey) {
        return;
      }
      lastMessagesRenderKey = renderKey;

      els.chatList.innerHTML = mergedRows.map((m) => {
        const mine = Number(m.sender_id) === Number(currentUser.id);
        const timeSuffix = m._pending ? ` · ${t("sending")}` : "";
        const readReceipt = (!m._pending && mine && Number(m.id) === latestReadMineId)
          ? `<div class="read-receipt">${t("peerRead")}</div>`
          : "";
        const canDelete = mine && !m._pending && String(m.content || "") !== String(t("deletedMessage"));
        const bubbleActions = canDelete
          ? `<div class="bubble-actions"><button class="bubble-action-btn" type="button" data-action="delete-message" data-message-id="${m.id}">${t("deleteMessage")}</button></div>`
          : "";
        return `
          <div class="bubble ${mine ? "mine" : "other"}">
            ${renderMessageBody(m)}
            <div class="time">${formatTime(m.created_at)}${mine ? timeSuffix : ""}</div>
            ${readReceipt}
            ${bubbleActions}
          </div>
        `;
      }).join("");

      els.chatList.scrollTop = els.chatList.scrollHeight;
    }

    async function refreshAll() {
      if (!currentUser) return;
      if (refreshRunning) return;

      refreshRunning = true;

      try {
        const [incoming, outgoing, friends] = await Promise.all([
          fetchIncomingRequests(),
          fetchOutgoingRequests(),
          fetchFriends(),
        ]);

        notifyUnreadChanges(friends);

        const displayFriends = applyActiveChatReadState(friends);

        renderIncoming(incoming);
        renderOutgoing(outgoing);
        renderFriends(displayFriends);

        if (selectedFriend) {
          const exist = displayFriends.find((f) => Number(f.id) === Number(selectedFriend.id));
          if (!exist) {
            // Avoid false jump-back on first open while background refresh catches up.
            if (Date.now() < selectedFriendGuardUntil) {
              try {
                const rows = await fetchMessages(selectedFriend.id);
                updateConversationState(selectedFriend.id, rows);
                renderMessages(rows);
                markRead(selectedFriend.id).catch(() => {});
              } catch {}
              return;
            }

            // Keep current chat when friend list is temporarily empty to avoid false deselection.
            if (!displayFriends.length) {
              try {
                const rows = await fetchMessages(selectedFriend.id);
                updateConversationState(selectedFriend.id, rows);
                renderMessages(rows);
                markRead(selectedFriend.id).catch(() => {});
              } catch {}
              return;
            }

            clearSelectedFriend();
            showFriendsView();
            return;
          }
          selectedFriendGuardUntil = 0;
          selectedFriend = exist;
          renderChatStatus(selectedFriend);
          const now = Date.now();
          if (now - lastActiveChatSyncAt >= ACTIVE_CHAT_SYNC_MIN_INTERVAL_MS || isConversationLoading) {
            const rows = await fetchMessages(selectedFriend.id);
            lastActiveChatSyncAt = now;
            updateConversationState(selectedFriend.id, rows);
            renderMessages(rows);
            const hasUnreadFromPeer = rows.some((m) => Number(m.sender_id) === Number(selectedFriend.id) && !m.read_at && !m._pending);
            if (hasUnreadFromPeer) {
              markRead(selectedFriend.id).catch(() => {});
            }
          }
        }
      } finally {
        refreshRunning = false;
      }
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(() => {
        refreshAll().catch((e) => {
          if (isNetworkError(e)) {
            showNetworkErrorModal();
          } else {
            setFriendMsg(t("refreshFailed", { message: e.message || t("unknownError") }));
          }
        });
      }, POLL_MS);
    }

    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

      updatePresence().catch(() => {});
      refreshAll().catch((error) => {
        setFriendMsg(t("refreshFailed", { message: error.message || t("unknownError") }));
      });
    }

      lastFriendsRenderKey = "";
      setUtilityPanel(null);
      setRequestTab("incoming");
      updateRequestBadge(0);
      els.friendsList.innerHTML = "";
      els.incomingList.innerHTML = "";
      els.outgoingList.innerHTML = "";
      updateView();
      setAuthMode("login");
      setAuthMsg(t("loggedOut"), true);
    });

    els.addFriendForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      const username = els.friendUsername.value.trim();
      if (!username) return setFriendMsg(t("enterTargetUsername"));

      try {
        const result = await sendFriendRequest(username);
        setFriendMsg(result.msg, result.ok);
        if (result.ok) {
          els.addFriendForm.reset();
          setUtilityPanel(null);
          await refreshAll();
        }
      } catch (error) {
        setFriendMsg(t("sendFailed", { message: error.message || t("unknownError") }));
      }
    });

    els.accountForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      const currentPassword = els.currentPassword.value;
      const newPassword = els.newPassword.value;
      const confirmPassword = els.newPassword2.value;

      if (newPassword.length < 6) {
        setFriendMsg(t("passwordMin"));
        alert(t("passwordMin"));
        return;
      }
      if (newPassword !== confirmPassword) {
        setFriendMsg(t("passwordMismatch"));
        alert(t("passwordMismatch"));
        return;
      }

      try {
        const ok = await changePassword(currentPassword, newPassword);
        if (!ok) {
          setFriendMsg(t("currentPasswordWrong"));
          alert(t("currentPasswordWrong"));
          return;
        }

        els.accountForm.reset();
        setFriendMsg(t("passwordUpdated"), true);
        alert(t("passwordUpdated"));
        setUtilityPanel(null);
      } catch (error) {
        const reason = t("processFailed", { message: error.message || t("unknownError") });
        setFriendMsg(reason);
        alert(reason);
      }
    });

    els.uploadAvatarBtn.addEventListener("click", () => {
      if (!currentUser) return;
      els.avatarInput.value = "";
      els.avatarInput.click();
    });

    els.takeAvatarBtn.addEventListener("click", async () => {
      if (!currentUser) return;
      const originalLabel = els.takeAvatarBtn.textContent;
      els.takeAvatarBtn.disabled = true;
      els.takeAvatarBtn.textContent = "⏳";
      try {
        await openCameraOverlay("avatar");
      } catch (error) {
        const message = resolveCameraErrorMessage(error);
        setFriendMsg(message);
        alert(message);
      } finally {
        els.takeAvatarBtn.disabled = false;
        els.takeAvatarBtn.textContent = originalLabel || t("takeAvatar");
      }
    });

    els.avatarInput.addEventListener("change", async () => {
      const file = els.avatarInput.files && els.avatarInput.files[0];
      if (!file || !currentUser) return;

      const maxBytes = MAX_AVATAR_FILE_MB * 1024 * 1024;
      if (file.size > maxBytes) {
        const msg = t("imageTooLarge", { size: MAX_AVATAR_FILE_MB });
        setFriendMsg(msg);
        alert(msg);
        els.avatarInput.value = "";
        return;
      }

      try {
        const mediaData = await readFileAsDataURL(file);
        await updateAvatar(mediaData);
        setFriendMsg(t("avatarUpdated"), true);
      } catch (error) {
        const msg = t("avatarUpdateFailed", { message: error.message || t("unknownError") });
        setFriendMsg(msg);
        alert(msg);
      } finally {
        els.avatarInput.value = "";
      }
    });

    els.incomingList.addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn || !currentUser) return;

      const id = Number(btn.dataset.id);
      const action = btn.dataset.action;
      try {
        if (action === "accept") {
          await acceptRequest(id);
          setFriendMsg(t("acceptedRequest"), true);
        } else if (action === "reject") {
          await rejectRequest(id);
          setFriendMsg(t("rejectedRequest"), true);
        }
        await refreshAll();
      } catch (error) {
        setFriendMsg(t("processFailed", { message: error.message || t("unknownError") }));
      }
    });

    els.friendsList.addEventListener("click", async (e) => {
      const avatar = e.target.closest("img.friend-avatar");
      if (avatar) {
        openImageViewer(avatar.currentSrc || avatar.src || "");
        return;
      }

      if (bootstrapInProgress) {
        setFriendMsg(t("loadingMessages"));
        return;
      }

      const card = e.target.closest(".item[data-friend-id]");
      if (!card || !currentUser) return;

      const friendId = Number(card.dataset.friendId);
      let friend = latestFriends.find((f) => Number(f.id) === friendId);

      if (!friend && card.dataset.friendUsername) {
        friend = latestFriends.find((f) => String(f.username) === String(card.dataset.friendUsername));
      }

      if (!friend) {
        setFriendMsg(t("processFailed", { message: t("unknownError") }));
        return;
      }

      selectedFriend = {
        id: Number(friend.id),
        display_name: friend.display_name,
        username: friend.username,
        is_online: !!friend.is_online,
        is_typing: !!friend.is_typing,
        unread_count: 0,
        last_seen_at: friend.last_seen_at || null,
      };
      selectedFriendGuardUntil = Date.now() + 8000;
      lastActiveChatSyncAt = 0;
      latestFriends = latestFriends.map((item) => (
        Number(item.id) === friendId
          ? { ...item, unread_count: 0 }
          : item
      ));
      lastFriendsRenderKey = "";
      renderFriends(latestFriends);
      lastMessagesRenderKey = "";

      els.chatTitle.textContent = `${selectedFriend.display_name} (@${selectedFriend.username})`;
      renderChatStatus(selectedFriend);
      els.chatInput.disabled = false;
      els.sendBtn.disabled = false;
      els.emojiToggleBtn.disabled = false;
      updateVoiceRecordButton();
      els.pickImageBtn.disabled = false;
      els.takePhotoBtn.disabled = false;
      els.sendLocationBtn.disabled = false;
      els.sendDocBtn.disabled = false;
      setUtilityPanel(null);
      showChatView();
      currentConversationFriendId = Number(selectedFriend.id);
      const cachedRows = conversationCacheByFriend.get(Number(selectedFriend.id)) || [];
      if (cachedRows.length) {
        updateConversationState(selectedFriend.id, cachedRows);
        isConversationLoading = false;
        renderMessages(cachedRows);
      } else {
        currentConversationRows = [];
        isConversationLoading = true;
        renderMessages([]);
      }

      fetchMessages(selectedFriend.id)
        .then(async (rows) => {
          updateConversationState(selectedFriend.id, rows);
          lastActiveChatSyncAt = Date.now();
          isConversationLoading = false;
          renderMessages(rows);
          markRead(selectedFriend.id).catch(() => {});
        })
        .catch((error) => {
          isConversationLoading = false;
          setFriendMsg(t("refreshFailed", { message: error.message || t("unknownError") }));
        });
    });

    els.backToFriendsBtn.addEventListener("click", () => {
      cancelVoiceRecording();
      clearTyping().catch(() => {});
      clearSelectedFriend();
      showFriendsView();
      refreshAll().catch(() => {});
    });

    els.chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser) {
        setChatNotice(t("needCredentials"));
        return;
      }

      if (!selectedFriend) {
        setChatNotice(t("selectFriendToChat"));
        setFriendMsg(t("selectFriendToChat"));
        return;
      }

      if (els.chatInput.disabled || els.sendBtn.disabled) {
        setChatNotice(t("selectFriendToChat"));
        return;
      }

      if (voiceReadyBlob || voiceReadyMediaData) {
        const blob = voiceReadyBlob;
        const mediaDataFromNative = voiceReadyMediaData;
        const content = voiceReadyContent;
        voiceReadyBlob = null;
        voiceReadyMediaData = "";
        voiceReadyContent = "";
        updateVoiceRecordButton();
        renderChatStatus(selectedFriend);
        try {
          const mediaData = mediaDataFromNative || await readFileAsDataURL(blob);
          await sendRichMessage({ content, messageType: "audio", mediaData });
        } catch (error) {
          setFriendMsg(t("voiceReadFailed", { message: error.message || t("unknownError") }));
        }
        return;
      }

      const text = els.chatInput.value.trim();
      if (!text) return;
      closeEmojiPicker();
      els.chatInput.value = "";
      await sendRichMessage({ content: text, messageType: "text" });
    });

    els.chatList.addEventListener("click", async (e) => {
      const image = e.target.closest("img.bubble-image");
      if (image) {
        openImageViewer(image.currentSrc || image.src || "");
        return;
      }

      const btn = e.target.closest("button[data-action='delete-message'][data-message-id]");
      if (!btn || !currentUser || !selectedFriend) return;

      const messageId = Number(btn.dataset.messageId);
      if (!messageId) return;

      try {
        await deleteOwnMessage(messageId);
        const rows = await fetchMessages(selectedFriend.id);
        updateConversationState(selectedFriend.id, rows);
        renderMessages(rows);
        refreshAll().catch(() => {});
      } catch (error) {
        setFriendMsg(t("processFailed", { message: error.message || t("unknownError") }));
      }
    });

    els.imageViewerClose.addEventListener("click", () => {
      closeImageViewer();
    });

    els.imageViewer.addEventListener("click", (e) => {
      if (e.target === els.imageViewer) {
        closeImageViewer();
      }
    });

    els.accountAvatarPreview.addEventListener("click", () => {
      const src = resolveAvatarSrc(currentUser);
      if (!src) return;
      openImageViewer(src);
    });

    els.sendBtn.addEventListener("click", (e) => {
      if (!currentUser) {
        e.preventDefault();
        setChatNotice(t("needCredentials"));
        return;
      }
      if (!selectedFriend) {
        e.preventDefault();
        setChatNotice(t("selectFriendToChat"));
        return;
      }
      if (els.chatForm && typeof els.chatForm.requestSubmit === "function") {
        e.preventDefault();
        els.chatForm.requestSubmit();
      }
    });

    function openImagePicker(withCamera = false) {
      if (!canComposeMessage()) {
        setChatNotice(t("selectFriendToChat"));
        return;
      }

      if (withCamera) {
        els.imageInput.setAttribute("capture", "environment");
      } else {
        els.imageInput.removeAttribute("capture");
      }
      els.imageInput.value = "";
      els.imageInput.click();
    }

    function resolveCameraErrorMessage(error) {
      const rawName = String(error?.name || "").toLowerCase();
      const rawCode = String(error?.code || "").toLowerCase();
      const rawMsg = String(error?.message || "").toLowerCase();

      if (rawCode.includes("not_supported") || rawName.includes("notsupported") || rawName.includes("notfound")) {
        return t("cameraNotSupported");
      }
      if (rawCode.includes("insecure") || rawMsg.includes("secure")) {
        return t("cameraInsecure");
      }
      if (
        rawName.includes("notallowed")
        || rawName.includes("securityerror")
        || rawMsg.includes("permission")
        || rawMsg.includes("denied")
      ) {
        return t("cameraPermissionDenied");
      }
      return t("cameraOpenFailed", { message: error?.message || t("unknownError") });
    }

    els.pickImageBtn.addEventListener("click", () => openImagePicker(false));
    els.takePhotoBtn.addEventListener("click", async () => {
      if (!canComposeMessage()) {
        setChatNotice(t("selectFriendToChat"));
        return;
      }

      const originalLabel = els.takePhotoBtn.textContent;
      els.takePhotoBtn.disabled = true;
      els.takePhotoBtn.textContent = "⏳";

      try {
        await openCameraOverlay("chat");
      } catch (error) {
        const message = resolveCameraErrorMessage(error);
        setChatNotice(message);
        setFriendMsg(message);
      } finally {
        els.takePhotoBtn.disabled = false;
        els.takePhotoBtn.textContent = originalLabel || t("takePhoto");
      }
    });

    els.cameraFlipBtn.addEventListener("click", async () => {
      if (els.cameraFlipBtn.disabled) return;
      els.cameraFlipBtn.disabled = true;
      try {
        if (cameraDeviceIds.length > 1) {
          cameraDeviceIndex = (cameraDeviceIndex + 1) % cameraDeviceIds.length;
          await startCameraStream(cameraFacingMode, cameraDeviceIds[cameraDeviceIndex]);
        } else {
          cameraFacingMode = cameraFacingMode === "environment" ? "user" : "environment";
          await startCameraStream(cameraFacingMode);
        }
      } catch {
        await startCameraStream("environment").catch(() => {});
      } finally {
        els.cameraFlipBtn.disabled = false;
      }
    });

    els.cameraCancelBtn.addEventListener("click", () => {
      closeCameraOverlay();
    });

    els.cameraOverlay.addEventListener("click", (e) => {
      if (e.target === els.cameraOverlay) {
        closeCameraOverlay();
      }
    });

    els.cameraCaptureBtn.addEventListener("click", async () => {
      if (els.cameraCaptureBtn.disabled) return;
      const originalLabel = els.cameraCaptureBtn.textContent;
      els.cameraCaptureBtn.disabled = true;
      els.cameraCaptureBtn.textContent = "⏳";
      try {
        await captureAndSendFromCamera();
      } catch (error) {
        const message = t("cameraOpenFailed", { message: error?.message || t("unknownError") });
        setChatNotice(message);
        setFriendMsg(message);
      } finally {
        els.cameraCaptureBtn.disabled = false;
        els.cameraCaptureBtn.textContent = originalLabel || t("cameraCapture");
      }
    });

    els.voiceRecordBtn.addEventListener("click", async () => {
      if (nativeVoiceRecording || (voiceMediaRecorder && voiceMediaRecorder.state === "recording")) {
        await stopVoiceRecording();
      } else if (voiceReadyBlob || voiceReadyMediaData) {
        voiceReadyBlob = null;
        voiceReadyMediaData = "";
        voiceReadyContent = "";
        updateVoiceRecordButton();
        renderChatStatus(selectedFriend);
      } else {
        await startVoiceRecording();
      }
    });

    els.imageInput.addEventListener("change", async () => {
      const file = els.imageInput.files && els.imageInput.files[0];
      if (!file) return;

      const maxBytes = MAX_IMAGE_FILE_MB * 1024 * 1024;
      if (file.size > maxBytes) {
        const msg = t("imageTooLarge", { size: MAX_IMAGE_FILE_MB });
        setChatNotice(msg);
        setFriendMsg(msg);
        alert("暂不支持超过3MB的文件");
        els.imageInput.value = "";
        return;
      }

      try {
        const mediaData = await readFileAsDataURL(file);
        await sendRichMessage({
          content: "",
          messageType: "image",
          mediaData,
        });
      } catch (error) {
        setChatNotice(t("readingImageFailed", { message: error.message || t("unknownError") }));
        setFriendMsg(t("readingImageFailed", { message: error.message || t("unknownError") }));
      } finally {
        els.imageInput.value = "";
      }
    });

    els.sendDocBtn.addEventListener("click", () => {
      if (!canComposeMessage()) {
        setChatNotice(t("selectFriendToChat"));
        return;
      }
      els.docInput.value = "";
      els.docInput.click();
    });

    els.docInput.addEventListener("change", async () => {
      const file = els.docInput.files && els.docInput.files[0];
      if (!file) return;

      const maxBytes = MAX_DOC_FILE_MB * 1024 * 1024;
      if (file.size > maxBytes) {
        setChatNotice(t("documentTooLarge", { size: MAX_DOC_FILE_MB }));
        setFriendMsg(t("documentTooLarge", { size: MAX_DOC_FILE_MB }));
        els.docInput.value = "";
        return;
      }

      try {
        const mediaData = await readFileAsDataURL(file);
        await sendRichMessage({
          content: file.name,
          messageType: "file",
          mediaData,
        });
      } catch (error) {
        setChatNotice(t("readingDocumentFailed", { message: error.message || t("unknownError") }));
        setFriendMsg(t("readingDocumentFailed", { message: error.message || t("unknownError") }));
      } finally {
        els.docInput.value = "";
      }
    });

    els.sendLocationBtn.addEventListener("click", async () => {
      if (!canComposeMessage()) {
        setChatNotice(t("selectFriendToChat"));
        return;
      }

      const origLabel = els.sendLocationBtn.textContent;
      els.sendLocationBtn.disabled = true;
      els.sendLocationBtn.textContent = "⏳";

      let latitude = null;
      let longitude = null;
      try {
        const resolved = await resolveLocationForMessage();
        latitude = resolved.latitude;
        longitude = resolved.longitude;

        await sendRichMessage({
          content: t("locationMessage"),
          messageType: "location",
          latitude,
          longitude,
        });
      } catch (error) {
        let msg;
        const code = error?.code;
        const detail = error?.message || t("unknownError");
        if (code === 1) {
          msg = t("locationPermissionDenied");
        } else if (String(error?.message || "") === "geolocation_insecure_context") {
          msg = t("locationInsecure");
        } else if (code === 2) {
          msg = t("locationUnavailable");
        } else if (code === 3) {
          msg = t("locationTimeout");
        } else if (String(error?.message || "").toLowerCase().includes("send message failed")) {
          msg = t("messageSendFailed", { message: error?.message || t("unknownError") });
        } else {
          msg = t("locationDenied", { message: detail });
        }
        setChatNotice(`${msg}${code ? ` (code: ${code})` : ""}`);
        setFriendMsg(msg);
      } finally {
        els.sendLocationBtn.disabled = false;
        els.sendLocationBtn.textContent = origLabel;
      }
    });

    els.chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        els.chatForm.requestSubmit();
        return;
      }

      if (e.key === "Escape") {
        stopTypingIndicatorNow();
      }
    });

    els.chatInput.addEventListener("input", () => {
      if (!currentUser || !selectedFriend) return;
      if (!els.chatInput.value.trim()) {
        stopTypingIndicatorNow();
        return;
      }

      scheduleTypingUpdate(selectedFriend.id);
    });

    els.chatInput.addEventListener("blur", () => {
      stopTypingIndicatorNow();
    });

    els.emojiToggleBtn.addEventListener("click", (e) => {
      e.preventDefault();
      if (!canComposeMessage()) {
        setChatNotice(t("selectFriendToChat"));
        return;
      }
      setEmojiPickerOpen(!emojiPickerOpen);
      if (emojiPickerOpen) {
        els.chatInput.focus();
      }
    });

    els.emojiGrid.addEventListener("click", (e) => {
      const button = e.target.closest("button[data-emoji]");
      if (!button) return;
      insertEmojiIntoChat(button.dataset.emoji || "");
    });

    document.addEventListener("click", (e) => {
      if (!emojiPickerOpen) return;
      const target = e.target;
      if (els.emojiPicker.contains(target) || els.emojiToggleBtn.contains(target)) return;
      closeEmojiPicker();
    });

    els.refreshBtn.addEventListener("click", async () => {
      if (refreshBtnLoading) return;

      refreshBtnLoading = true;
      renderRefreshButton();
      const startedAt = Date.now();

      try {
        await refreshAll();
        showRefreshCompleteToast();
      } catch (error) {
        setFriendMsg(t("refreshFailed", { message: error.message || t("unknownError") }));
      } finally {
        const elapsed = Date.now() - startedAt;
        const waitMs = Math.max(0, 450 - elapsed);
        setTimeout(() => {
          refreshBtnLoading = false;
          renderRefreshButton();
        }, waitMs);
      }
    });

    const tryUnlockSound = () => {
      if (notificationAudioUnlocked) return;
      unlockNotificationSound().catch(() => {});
    };
    document.addEventListener("pointerdown", tryUnlockSound, { passive: true });
    document.addEventListener("touchstart", tryUnlockSound, { passive: true });
    document.addEventListener("keydown", tryUnlockSound);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && els.imageViewer.classList.contains("show")) {
        closeImageViewer();
      }
    });

    window.addEventListener("focus", triggerForegroundRefresh);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        if (currentUser) {
          startPolling();
        }
        triggerForegroundRefresh();
      } else if (currentUser) {
        cancelVoiceRecording();
        clearTypingTimers();
        if (!isAndroidAppRuntime()) {
          stopPolling();
        }
      }
    });

    window.addEventListener("pagehide", () => {
      if (currentUser) {
        cancelVoiceRecording();
        clearTypingTimers();
      }
    });

    window.addEventListener("offline", () => {
      showNetworkErrorModal();
    });

    window.addEventListener("online", () => {
      hideNetworkErrorModal();
      if (currentUser) {
        refreshAll().catch(() => {});
      }
    });

    document.getElementById("netErrorRetryBtn").addEventListener("click", async () => {
      const connected = await ensureInternetConnection({ showModal: true });
      if (!connected) return;
      if (currentUser) {
        refreshAll().catch(() => {});
      }
    });

    (async function bootstrap() {
      renderEmojiPicker();
      applyLanguage();
      setAuthMode("login");
      const instantRestored = restoreUserCacheInstant();
      if (!instantRestored) {
        updateView();
      }
      if (!navigator.onLine) {
        showNetworkErrorModal();
      }

      try {
        await initDatabase();
        const restoredBySession = await restoreLoginSession().catch(() => false);
        const restoredByCache = restoredBySession ? true : await restoreCachedLogin().catch(() => false);
        const restoredByUserCache = (restoredBySession || restoredByCache)
          ? instantRestored
          : await restoreUserCacheLogin().catch(() => false);
        if (!restoredBySession && !restoredByCache && !restoredByUserCache) {
          setAuthMsg(t("promptRegisterLogin"), true);
          if (await ensureInternetConnection()) {
            showRefreshCompleteToast();
          }
        } else if (currentUser) {
          await waitForRefreshIdle();
          requestNotificationPermission().catch(() => {});
          startPolling();
          try {
            await refreshAll();
          } catch (error) {
            if (isNetworkError(error)) {
              showNetworkErrorModal();
            } else {
              setFriendMsg(t("refreshFailed", { message: error.message || t("unknownError") }));
            }
          }
          updatePresence().catch(() => {});
          showRefreshCompleteToast();
        }
      } catch (error) {
        if (isNetworkError(error)) {
          showNetworkErrorModal();
        } else {
          setAuthMsg(t("dbInitFailed", { message: error.message || t("unknownError") }));
        }
      } finally {
        bootstrapInProgress = false;
      }
    })();
  </script>
</body>
</html>
