  <title>ChatsApp</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap");

    :root {
      --bg: #edf2ea;
      --bg-2: #f8fbf6;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-strong: #ffffff;
      --border: rgba(15, 23, 42, 0.08);
      --text: #18212f;
      --muted: #6b7280;
      --primary: #22c55e;
      --primary-2: #16a34a;
      --danger: #ef4444;
      --ok: #16a34a;
      --shadow: 0 18px 45px rgba(41, 72, 52, 0.08);
      --page-gutter: clamp(4px, 1.6vw, 22px);
      --surface-pad: clamp(8px, 1.3vw, 16px);
      --stack-gap: clamp(10px, 1.4vw, 16px);
      --app-frame-height: calc(100dvh - (var(--page-gutter) * 2) - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overscroll-behavior: none;
      overflow: hidden;
    }

    body {
      font-family: "Outfit", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.16), transparent 28%),
        linear-gradient(180deg, #f7fbf7 0%, #edf2ea 100%);
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: calc(var(--page-gutter) + env(safe-area-inset-top, 0px));
      padding-right: calc(var(--page-gutter) + env(safe-area-inset-right, 0px));
      padding-bottom: calc(var(--page-gutter) + env(safe-area-inset-bottom, 0px));
      padding-left: calc(var(--page-gutter) + env(safe-area-inset-left, 0px));
      animation: appFadeIn 0.5s ease;
    }

    .app {
      width: 100%;
      margin: 0;
      height: var(--app-frame-height);
      max-height: var(--app-frame-height);
      min-height: var(--app-frame-height);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: var(--stack-gap);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      border: 1px solid rgba(29, 173, 75, 0.22);
      background: #f6fbf4 url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIiByb2xlPSJpbWciIGFyaWEtbGFiZWw9IkNoYXRzQXBwIEljb24iPg0KICA8ZGVmcz4NCiAgICA8bGluZWFyR3JhZGllbnQgaWQ9ImJnIiB4MT0iMCIgeTE9IjAiIHgyPSIxIiB5Mj0iMSI+DQogICAgICA8c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjZjFmOGVlIi8+DQogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiNlNGYyZGYiLz4NCiAgICA8L2xpbmVhckdyYWRpZW50Pg0KICAgIDxsaW5lYXJHcmFkaWVudCBpZD0iYnViYmxlIiB4MT0iMCIgeTE9IjAiIHgyPSIxIiB5Mj0iMSI+DQogICAgICA8c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjNGVjYjU2Ii8+DQogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiMxZGFkNGIiLz4NCiAgICA8L2xpbmVhckdyYWRpZW50Pg0KICA8L2RlZnM+DQoNCiAgPHJlY3QgeD0iMCIgeT0iMCIgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIHJ4PSIxMTYiIGZpbGw9InVybCgjYmcpIi8+DQoNCiAgPHBhdGggZD0iTTEyNyAxNDdjLTQ5IDAtODkgMzQtODkgNzggMCAyOSAxNyA1NCA0MyA2OGwtMTAgNDNjLTIgOCA2IDE0IDEzIDEwbDQ1LTI2YzYgMSAxMyAyIDIwIDJoMTA1YzQ5IDAgODktMzQgODktNzhzLTQwLTc3LTg5LTc3SDEyN3oiDQogICAgICAgIGZpbGw9IiNmZmZmZmYiDQogICAgICAgIHN0cm9rZT0idXJsKCNidWJibGUpIg0KICAgICAgICBzdHJva2Utd2lkdGg9IjE2Ig0KICAgICAgICBzdHJva2UtbGluZWpvaW49InJvdW5kIi8+DQoNCiAgPGNpcmNsZSBjeD0iMTY1IiBjeT0iMjQ0IiByPSIxNyIgZmlsbD0idXJsKCNidWJibGUpIi8+DQogIDxjaXJjbGUgY3g9IjIyNiIgY3k9IjI0NCIgcj0iMTciIGZpbGw9InVybCgjYnViYmxlKSIvPg0KDQogIDxwYXRoIGQ9Ik0yNjAgMTQ5aDEwMmM2MiAwIDExMiA0MyAxMTIgOTYgMCAzMy0yMCA2Mi01MCA3OWwxMiA1MWMyIDktNyAxNi0xNSAxMWwtNTItMjljLTIgMC00IDAtNyAwSDI2MGMtNjIgMC0xMTItNDMtMTEyLTk2czUwLTExMiAxMTItMTEyeiINCiAgICAgICAgZmlsbD0idXJsKCNidWJibGUpIi8+DQoNCiAgPGNpcmNsZSBjeD0iMzMyIiBjeT0iMjQ2IiByPSIxNyIgZmlsbD0iI2ZmZmZmZiIvPg0KICA8Y2lyY2xlIGN4PSIzOTMiIGN5PSIyNDYiIHI9IjE3IiBmaWxsPSIjZmZmZmZmIi8+DQo8L3N2Zz4NCg==") center / 82% no-repeat;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 10px 25px rgba(34, 197, 94, 0.18);
    }

    .title { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
    .muted { color: var(--muted); font-size: 13px; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      animation: cardRiseIn 0.45s ease both;
    }

    .hidden { display: none !important; }

    .auth-wrap {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: var(--surface-pad);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-shell {
      width: min(100%, clamp(300px, 42vw, 520px));
    }

    .auth-main {
      padding: clamp(16px, 3vw, 32px);
      border-radius: 22px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      background: rgba(255,255,255,0.9);
      position: relative;
      overflow: hidden;
    }

    .auth-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
      border-radius: 0 3px 3px 0;
      transition: width 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }

    .auth-progress.running {
      opacity: 1;
      animation: authProgressPulse 1.4s ease-in-out infinite;
    }

    @keyframes authProgressPulse {
      0%   { width: 0%; }
      40%  { width: 72%; }
      70%  { width: 88%; }
      100% { width: 88%; }
    }

    .auth-progress.done {
      opacity: 1;
      width: 100% !important;
      animation: none;
      transition: width 0.15s ease, opacity 0.3s ease 0.2s;
    }

    .auth-brand {
      display: grid;
      justify-items: center;
      gap: 10px;
      margin-bottom: 18px;
      text-align: center;
    }

    .auth-brand .brand-mark {
      width: 56px;
      height: 56px;
      border-radius: 20px;
    }

    .auth-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .auth-subtitle {
      font-size: 13px;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 2px solid rgba(15, 23, 42, 0.08);
    }

    .tab {
      flex: 1;
      border: 0;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      border-radius: 0;
      padding: 11px 8px;
      background: transparent;
      color: #9ca3af;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.01em;
      transition: color 0.18s ease, border-color 0.18s ease;
    }

    .tab:hover {
      color: #374151;
      transform: none;
    }

    .tab:active {
      transform: none;
    }

    .tab.active {
      color: var(--primary-2);
      border-bottom-color: var(--primary-2);
      background: transparent;
      box-shadow: none;
    }

    form.grid { display: grid; gap: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr; gap: 12px; }

    input, button, textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #d7dfe4;
      background: #ffffff;
      color: #111827;
      padding: 12px 14px;
      font: inherit;
      outline: none;
      transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.15s ease, background-color 0.2s ease;
    }

    textarea { min-height: 84px; resize: none; }

    input:focus, textarea:focus {
      border-color: rgba(34,197,94,0.8);
      box-shadow: 0 0 0 3px rgba(34,197,94,0.16);
    }

    button {
      cursor: pointer;
      font-weight: 700;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
      border: 0;
      color: white;
      box-shadow: 0 10px 18px rgba(34, 197, 94, 0.22);
    }

    .btn-secondary { background: #eff4ef; border: 1px solid rgba(15,23,42,0.08); color: #1f2937; }
    .btn-danger { background: var(--danger); border: 0; }

    .lang-switch {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border-radius: 14px;
      border: 1px solid rgba(15,23,42,0.08);
      background: rgba(255,255,255,0.72);
    }

    .lang-btn {
      width: auto;
      min-width: 48px;
      padding: 8px 12px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #4b5563;
      font-weight: 700;
    }

    .lang-btn.active {
      background: #ffffff;
      color: #111827;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }

    .msg {
      min-height: 18px;
      font-size: 13px;
      color: #fca5a5;
    }

    .main {
      min-height: 0;
      height: 100%;
      display: grid;
      overflow: hidden;
    }

    .main > * {
      min-height: 0;
    }

    .sidebar {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: var(--surface-pad);
      display: grid;
      grid-template-rows: auto auto;
      gap: var(--stack-gap);
      min-height: 0;
      height: auto;
    }

    .sidebar-top {
      display: grid;
      gap: 12px;
    }

    .sidebar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .mini-btn {
      width: auto;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 600;
    }

    #refreshBtn {
      min-width: 96px;
    }

    #refreshBtn.loading {
      opacity: 0.9;
      pointer-events: none;
    }

    .refresh-btn-content {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      line-height: 1;
    }

    .refresh-icon {
      display: inline-block;
      font-size: 14px;
      transform-origin: 50% 50%;
    }

    #refreshBtn.loading .refresh-icon {
      animation: refreshSpin 0.8s linear infinite;
    }

    @keyframes refreshSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .utility-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .action-chip {
      width: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(15,23,42,0.08);
      background: #f4f7f4;
      color: #1f2937;
      font-weight: 700;
    }

    .action-chip.active {
      background: rgba(34,197,94,0.12);
      border-color: rgba(34,197,94,0.28);
      color: #15803d;
    }

    .utility-stack {
      display: grid;
      gap: 10px;
    }

    .utility-panel {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #f7faf7 100%);
      animation: panelDropIn 0.3s ease both;
    }

    .account-avatar-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 14px;
      background: #f8fbf8;
    }

    .account-avatar-preview {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      object-fit: cover;
      background: #ffffff;
      cursor: zoom-in;
    }

    .account-avatar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .account-avatar-actions .mini-btn {
      padding: 8px 10px;
      min-height: 36px;
      border-radius: 10px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 700;
    }

    .request-tabs {
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      border-radius: 14px;
      background: #eef2ef;
      margin-bottom: 12px;
    }

    .request-tab {
      width: auto;
      padding: 8px 12px;
      border-radius: 10px;
      border: 0;
      background: transparent;
      font-weight: 600;
      color: #4b5563;
    }

    .request-tab.active {
      background: #ffffff;
      color: #111827;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }

    .block {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 12px;
      background: rgba(255,255,255,0.86);
    }

    .block h3 {
      font-size: 15px;
      margin-bottom: 10px;
      color: #1f2937;
    }

    .list { display: grid; gap: 8px; max-height: 280px; overflow: auto; }

    .friends-wrap {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto auto;
    }

    .friends-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .friends-search {
      width: 100%;
      margin-bottom: 10px;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: #ffffff;
      padding: 9px 11px;
      font-size: 13px;
      height: 40px;
      min-height: unset;
    }

    .friends-list {
      display: grid;
      gap: 8px;
      overflow-y: auto;
      max-height: clamp(240px, 48vh, 520px);
      padding-right: 4px;
      contain: content;
      will-change: scroll-position;
      scroll-behavior: smooth;
    }

    .item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: #f9fbf8;
      transform: translateZ(0);
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .friend-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .friend-avatar {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      object-fit: cover;
      flex-shrink: 0;
      background: #ffffff;
      cursor: zoom-in;
    }

    .friend-info {
      min-width: 0;
    }

    .friend-name-line {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .friend-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .friend-preview {
      font-size: 12px;
      color: #667085;
      margin-top: 4px;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .friend-time {
      font-size: 11px;
      color: #8b95a1;
      margin-left: 8px;
      white-space: nowrap;
    }

    .bubble-actions {
      margin-top: 6px;
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    .bubble-action-btn {
      width: auto;
      min-width: 44px;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      background: rgba(255, 255, 255, 0.66);
      color: #334155;
      font-size: 11px;
      font-weight: 700;
      line-height: 20px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .status-online { background: #22c55e; }
    .status-offline { background: #9ca3af; }

    .item button { width: auto; padding: 8px 12px; font-size: 12px; }

    .friends .item {
      cursor: pointer;
      transition: border-color 0.2s ease, background-color 0.2s ease, transform 0.2s ease;
    }

    .friends .item.active {
      border-color: rgba(34,197,94,0.28);
      background: rgba(34,197,94,0.12);
      transform: translateY(-1px);
    }

    .badge-dot {
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      font-size: 11px;
      line-height: 18px;
      text-align: center;
      padding: 0 5px;
      font-weight: 700;
    }

    .typing-text {
      color: #16a34a;
      font-size: 12px;
      margin-top: 4px;
    }

    .chat {
      width: 100%;
      max-width: none;
      margin: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: var(--stack-gap);
      padding: var(--surface-pad);
      min-height: 0;
      height: 100%;
    }

    #friendsPane:not(.hidden),
    #chatPane:not(.hidden) {
      animation: paneSwitchIn 0.28s ease;
    }

    .chat-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.86);
    }

    .chat-list {
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      background:
        radial-gradient(circle at top right, rgba(34,197,94,0.08), transparent 26%),
        #f4f7f4;
      overflow: auto;
      min-height: 0;
      max-height: none;
      display: grid;
      align-content: start;
      gap: 10px;
      contain: content;
      will-change: scroll-position;
      scroll-behavior: smooth;
    }

    .bubble {
      max-width: 76%;
      border-radius: 18px;
      padding: 10px 12px;
      border: 1px solid transparent;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
      transform: translateZ(0);
    }

    .mine {
      justify-self: end;
      background: linear-gradient(180deg, #a7f07c 0%, #95ec69 100%);
      color: #111827;
      border-color: #84d95e;
    }

    .other {
      justify-self: start;
      background: #ffffff;
      color: #111827;
      border-color: #e5e7eb;
    }

    .time {
      margin-top: 4px;
      font-size: 11px;
      color: #6b7280;
    }

    .read-receipt {
      margin-top: 4px;
      font-size: 11px;
      color: #16a34a;
      font-weight: 600;
      text-align: right;
    }

    .bubble-file {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      max-width: min(240px, 62vw);
    }

    .file-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .file-link {
      color: inherit;
      font-size: 13px;
      word-break: break-all;
      text-decoration: underline;
      text-underline-offset: 3px;
      opacity: 0.9;
    }

    .bubble-image {
      max-width: min(260px, 62vw);
      max-height: 300px;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      display: block;
      object-fit: cover;
      margin-top: 4px;
      cursor: zoom-in;
    }

    .image-viewer {
      position: fixed;
      inset: 0;
      z-index: 12000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.88);
      padding: 18px;
    }

    .image-viewer.show {
      display: flex;
    }

    .image-viewer img {
      max-width: min(96vw, 1200px);
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 22px 46px rgba(0, 0, 0, 0.35);
      object-fit: contain;
      background: rgba(255, 255, 255, 0.04);
    }

    .image-viewer-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(15, 23, 42, 0.55);
      color: #fff;
      font-size: 22px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transform: none !important;
    }

    .camera-overlay {
      position: fixed;
      inset: 0;
      z-index: 12500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.92);
      padding: 14px;
    }

    .camera-card {
      width: min(96vw, 480px);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(15, 23, 42, 0.85);
      box-shadow: 0 18px 40px rgba(2, 6, 23, 0.45);
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .camera-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .camera-title {
      color: #e5e7eb;
      font-size: 14px;
      font-weight: 700;
      flex: 1;
      text-align: center;
    }

    .camera-flip-btn {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #e5e7eb;
      font-size: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s ease, transform 0.2s ease;
    }

    .camera-flip-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .camera-flip-btn:active {
      transform: rotate(180deg);
    }

    .camera-flip-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .camera-preview {
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: #020617;
      object-fit: cover;
    }

    .camera-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .camera-actions button {
      border-radius: 12px;
      min-height: 42px;
    }

    .location-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      color: #166534;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
    }

    .location-link:hover {
      text-decoration: underline;
    }

    .notify-toast {
      position: fixed;
      right: 16px;
      top: 18px;
      z-index: 9999;
      min-width: 240px;
      max-width: min(360px, calc(100vw - 32px));
      border-radius: 14px;
      border: 1px solid rgba(34, 197, 94, 0.28);
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 18px 30px rgba(15, 23, 42, 0.16);
      padding: 10px 12px;
      transform: translateY(-12px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .notify-toast.show {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .notify-toast-title {
      font-size: 12px;
      color: #16a34a;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .notify-toast-body {
      font-size: 13px;
      color: #1f2937;
      word-break: break-word;
    }

    .composer {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: end;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .composer-box {
      position: relative;
      min-width: 0;
    }

    .composer-actions {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .composer-actions .mini-btn {
      width: auto;
      min-width: 44px;
      height: 48px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: #eef3ef;
      color: #1f2937;
      font-weight: 700;
    }

    .emoji-picker {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(100% + 10px);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
      padding: 12px;
      backdrop-filter: blur(10px);
      animation: panelDropIn 0.24s ease both;
    }

    .emoji-picker.hidden {
      display: none !important;
    }

    .emoji-picker-title {
      font-size: 12px;
      font-weight: 700;
      color: #4b5563;
      margin-bottom: 10px;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 8px;
    }

    .emoji-btn {
      min-width: 0;
      height: 40px;
      padding: 0;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: #f5f8f5;
      font-size: 20px;
      line-height: 1;
      box-shadow: none;
    }

    .emoji-btn:hover {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.22);
    }

    #emojiToggleBtn.active {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.28);
      color: #15803d;
    }

    .voice-record-btn.active {
      background: linear-gradient(90deg, #ef4444, #f97316);
      border-color: rgba(239, 68, 68, 0.28);
      color: #ffffff;
    }

    .voice-record-btn.ready {
      background: linear-gradient(90deg, #8b5cf6, #a78bfa);
      border-color: rgba(139, 92, 246, 0.28);
      color: #ffffff;
    }

    .bubble-audio {
      width: min(240px, 62vw);
      max-width: 100%;
      display: block;
      margin-top: 4px;
    }

    .audio-caption {
      margin-top: 6px;
    }

    #sendBtn { width: 108px; height: 48px; }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 100%;
      color: #7c8795;
      text-align: center;
      padding: 32px 12px;
      font-size: 14px;
      animation: itemSlideIn 0.2s ease;
    }

    @keyframes appFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes cardRiseIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes paneSwitchIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes panelDropIn {
      from { opacity: 0; transform: translateY(-4px) scale(0.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes itemSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 960px) {
      .utility-actions { flex-wrap: wrap; }
      .chat-list { max-height: none; }
      .header { align-items: flex-start; }
      .title { font-size: 24px; }
      .composer { grid-template-columns: 1fr; }
      .composer-actions { width: 100%; justify-content: flex-start; }
      #sendBtn { width: 100%; }
      .chat { padding-bottom: calc(var(--surface-pad) + env(safe-area-inset-bottom, 0px)); }
    }

    @media (max-width: 640px) {
      :root {
        --page-gutter: 4px;
        --surface-pad: 8px;
        --stack-gap: 6px;
      }

      body {
        font-size: 14px;
      }

      .title {
        font-size: 20px;
      }

      .brand {
        gap: 8px;
      }

      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 12px;
      }

      .header {
        gap: 8px;
      }

      .header-right {
        gap: 6px;
        width: 100%;
        justify-content: space-between;
      }

      .card {
        border-radius: 16px;
      }

      .auth-main {
        padding: 14px;
        border-radius: 16px;
      }

      .auth-title {
        font-size: 20px;
      }

      input, button, textarea {
        border-radius: 12px;
        padding: 10px 12px;
      }

      .tab {
        padding: 8px 12px;
      }

      .sidebar {
        padding: 6px;
      }

      .utility-actions {
        gap: 6px;
      }

      .action-chip {
        padding: 8px 10px;
        border-radius: 12px;
        font-size: 12px;
      }

      .block {
        padding: 10px;
        border-radius: 14px;
      }

      .friends-search {
        margin-bottom: 8px;
        padding: 8px 10px;
      }

      .item {
        padding: 10px;
        border-radius: 12px;
      }

      .friend-preview {
        max-width: 160px;
      }

      .chat {
        padding: 6px;
        gap: 6px;
      }

      .chat-head {
        padding: 10px;
        border-radius: 14px;
      }

      .chat-list {
        padding: 8px;
        border-radius: 14px;
      }

      .bubble {
        max-width: 88%;
        border-radius: 14px;
        padding: 8px 10px;
        font-size: 13px;
      }

      .composer {
        gap: 6px;
      }

      .composer-actions {
        gap: 6px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 2px;
      }

      .composer-actions .mini-btn {
        min-width: 40px;
        height: 42px;
        padding: 0 10px;
        border-radius: 10px;
      }

      textarea {
        min-height: 62px;
      }

      #sendBtn {
        height: 40px;
        border-radius: 12px;
      }

      .item-top { align-items: flex-start; }
    }

    @media (max-width: 420px) {
      .title {
        font-size: 18px;
      }

      .brand-mark {
        width: 32px;
        height: 32px;
        border-radius: 10px;
      }

      .lang-btn {
        min-width: 42px;
        padding: 6px 10px;
      }

      .chat-head {
        padding: 8px;
      }

      .chat-list {
        padding: 7px;
      }

      textarea {
        min-height: 56px;
      }

      .friend-preview {
        max-width: 130px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    /* ── Network Error Overlay ── */
    .net-error-overlay {
      position: fixed;
      inset: 0;
      z-index: 20000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(6px);
      padding: 18px;
    }

    .net-error-overlay.hidden { display: none !important; }

    .net-error-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.24);
      animation: cardRiseIn 0.35s ease both;
    }

    .net-error-icon {
      font-size: 54px;
      margin-bottom: 14px;
    }

    .net-error-title {
      font-size: 20px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
    }

    .net-error-body {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.55;
    }

    .net-error-retry {
      background: linear-gradient(90deg, #22c55e, #16a34a);
      border: 0;
      color: #ffffff;
      border-radius: 14px;
      padding: 12px 32px;
      font-weight: 700;
      font-size: 14px;
      width: auto;
      box-shadow: 0 10px 18px rgba(34, 197, 94, 0.22);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="title">ChatsApp</div>
      </div>
      <div class="header-right">
        <div class="lang-switch">
          <button id="langZhBtn" class="lang-btn" type="button">中</button>
          <button id="langEnBtn" class="lang-btn active" type="button">EN</button>
        </div>
        <div id="userBox" class="hidden" style="display:flex; gap:8px; align-items:center;">
          <span id="currentUserText" class="muted"></span>
          <span id="autoLoginHint" class="muted"></span>
          <button id="logoutBtn" class="btn-secondary mini-btn" type="button" style="width:auto;">退出</button>
        </div>
      </div>
    </div>

    <section id="authSection" class="card auth-wrap">
      <div class="auth-shell">
        <div class="auth-main">
            <div id="authProgress" class="auth-progress"></div>
          <div class="auth-brand">
            <div class="brand-mark"></div>
            <div class="auth-title">ChatsApp</div>
            <div id="authSubtitle" class="auth-subtitle">登录或注册</div>
          </div>

          <div class="tabs">
            <button id="tabLogin" class="tab active" type="button">登录</button>
            <button id="tabRegister" class="tab" type="button">注册</button>
          </div>

          <form id="loginForm" class="grid">
            <input id="loginUsername" placeholder="用户名" required />
            <input id="loginPassword" type="password" placeholder="密码" required />
            <button id="loginBtn" class="btn-primary" type="submit">登录</button>
          </form>

          <form id="registerForm" class="grid hidden">
            <div class="grid-2">
              <input id="regUsername" placeholder="用户名（唯一）" required />
              <input id="regDisplayName" placeholder="昵称" required />
            </div>
            <div class="grid-2">
              <input id="regPassword" type="password" placeholder="密码（至少6位）" required />
              <input id="regPassword2" type="password" placeholder="确认密码" required />
            </div>
            <button id="registerBtn" class="btn-primary" type="submit">注册</button>
          </form>

          <p id="authMsg" class="msg"></p>
        </div>
      </div>
    </section>

    <section id="mainSection" class="main hidden">
      <aside id="friendsPane" class="card sidebar">
        <div class="sidebar-top">
          <div class="utility-actions">
            <button id="toggleChatsBtn" class="action-chip active" type="button">聊天</button>
            <button id="toggleAddFriendBtn" class="action-chip" type="button">加好友</button>
            <button id="toggleRequestsBtn" class="action-chip" type="button">
              <span id="requestsLabel">申请</span>
              <span id="requestBadge" class="badge-dot hidden">0</span>
            </button>
            <button id="toggleAccountBtn" class="action-chip" type="button">账号</button>
            <button id="refreshBtn" class="btn-secondary mini-btn" type="button">刷新</button>
          </div>

          <div class="utility-stack">
            <div id="addFriendPanel" class="utility-panel hidden">
              <div class="panel-head">
                <div id="addFriendTitle" class="panel-title">添加好友</div>
              </div>
              <form id="addFriendForm" class="grid">
                <input id="friendUsername" placeholder="输入用户名" required />
                <button id="addFriendSubmitBtn" class="btn-primary" type="submit">发送申请</button>
              </form>
              <p id="friendMsg" class="msg"></p>

    function parseDbTime(v) {
      if (!v) return null;
      if (v instanceof Date) return Number.isNaN(v.getTime()) ? null : v;

      if (typeof v === "string") {
        const raw = v.trim();
        if (!raw) return null;

        // Treat DB timestamps without timezone as China local time.
        if (/Z|[+-]\d{2}:\d{2}$/.test(raw)) {
          const withTz = new Date(raw);
          return Number.isNaN(withTz.getTime()) ? null : withTz;
        }

        const normalized = raw.replace(" ", "T");
        const asChinaTime = new Date(`${normalized}+08:00`);
        return Number.isNaN(asChinaTime.getTime()) ? null : asChinaTime;
      }

      const d = new Date(v);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function getShanghaiDayNumber(d) {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: APP_TIME_ZONE,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).formatToParts(d);

      const year = Number(parts.find((p) => p.type === "year")?.value || 0);
      const month = Number(parts.find((p) => p.type === "month")?.value || 0);
      const day = Number(parts.find((p) => p.type === "day")?.value || 0);
      return Math.floor(Date.UTC(year, month - 1, day) / 86400000);
    }

        const err = new Error("camera_not_supported");
        err.code = "camera_not_supported";
        throw err;
      }

      if (!window.isSecureContext) {
        const err = new Error("camera_insecure_context");
        err.code = "camera_insecure_context";
        throw err;
      }

      cameraCaptureMode = mode;
      cameraFacingMode = "environment";
      cameraDeviceIds = [];
      cameraDeviceIndex = 0;
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        cameraDeviceIds = devices.filter((d) => d.kind === "videoinput").map((d) => d.deviceId).filter(Boolean);
      } catch {
        cameraDeviceIds = [];
      }

      if (cameraDeviceIds.length > 0) {
        await startCameraStream(cameraFacingMode, cameraDeviceIds[cameraDeviceIndex]);
      } else {
        await startCameraStream(cameraFacingMode);
      }

      const hasMultipleCameras = cameraDeviceIds.length > 1;
      els.cameraFlipBtn.classList.toggle("hidden", !hasMultipleCameras);

      els.cameraOverlay.classList.remove("hidden");
      els.cameraOverlay.setAttribute("aria-hidden", "false");

    async function unlockNotificationSound() {
      const ctx = getNotificationAudioContext();
      if (!ctx) return;

      try {
        if (ctx.state === "suspended") {
          await ctx.resume();
        }
        notificationAudioUnlocked = ctx.state === "running";
      } catch {}
    }

    async function playNotificationSound() {
      const ctx = getNotificationAudioContext();
      if (!ctx) return;

      try {
        if (ctx.state !== "running") {
          await ctx.resume();
        }
        if (ctx.state !== "running") return;

        const now = ctx.currentTime;
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(880, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start(now);
        oscillator.stop(now + 0.2);
        notificationAudioUnlocked = true;
      } catch {}
    }

      } catch {}
    }

    function notifyUnreadChanges(rows) {
      const list = rows || [];
      const totalUnread = list.reduce((sum, friend) => sum + Number(friend.unread_count || 0), 0);

      const getMessageTimeValue = (friend) => {
        const d = parseDbTime(friend.last_message_at);
        return d ? d.getTime() : 0;
      };

      if (!unreadSnapshotReady) {
        unreadSnapshotByFriend.clear();
        lastNotifiedMessageAtByFriend.clear();
        list.forEach((friend) => {
          unreadSnapshotByFriend.set(Number(friend.id), Number(friend.unread_count || 0));
          lastNotifiedMessageAtByFriend.set(Number(friend.id), getMessageTimeValue(friend));
        });
        lastTotalUnreadCount = totalUnread;
        unreadSnapshotReady = true;
        return;
      }

      const existingIds = new Set();
      let triggered = false;
      list.forEach((friend) => {
        const friendId = Number(friend.id);
        existingIds.add(friendId);

        const previous = Number(unreadSnapshotByFriend.get(friendId) || 0);
        const current = Number(friend.unread_count || 0);
        unreadSnapshotByFriend.set(friendId, current);

        const previousMessageTime = Number(lastNotifiedMessageAtByFriend.get(friendId) || 0);
        const currentMessageTime = getMessageTimeValue(friend);
        if (currentMessageTime > 0) {
          lastNotifiedMessageAtByFriend.set(friendId, currentMessageTime);
        }

        if (current <= 0) return;
        if (current <= previous && currentMessageTime <= previousMessageTime) return;
        const isActiveSameChat = !!(
          selectedFriend
          && Number(selectedFriend.id) === friendId
          && document.visibilityState === "visible"
        );
        if (isActiveSameChat) return;

        const delta = Math.max(1, current - previous);
        const friendName = friend.display_name || friend.username || t("userDefaultName");
        const title = t("newMessageAlert");
        const body = t("newMessageFrom", { name: friendName, count: delta });
        showInAppNotification(title, body);
        notifySystem(title, body, friendId);
        playNotificationSound().catch(() => {});
        triggered = true;
      });

      if (!triggered && totalUnread > lastTotalUnreadCount) {
        const fallbackFriend = list.find((friend) => Number(friend.unread_count || 0) > 0);
        if (fallbackFriend) {
          const friendId = Number(fallbackFriend.id);
          const isActiveSameChat = !!(
            selectedFriend
            && Number(selectedFriend.id) === friendId

    function isValidCoordinate(value, min, max) {
      return Number.isFinite(value) && value >= min && value <= max;
    }

    function normalizePosition(position) {
      const latitude = Number(position?.coords?.latitude);
      const longitude = Number(position?.coords?.longitude);
      const accuracy = Number(position?.coords?.accuracy || Number.POSITIVE_INFINITY);

      if (!isValidCoordinate(latitude, -90, 90) || !isValidCoordinate(longitude, -180, 180)) {
        throw new Error("browser_location_invalid");
      }

      return { latitude, longitude, accuracy };
    }

    function requestCurrentPosition(options) {
      return new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, options);
      });
    }

    async function requestPrecisePosition(maxWaitMs = 35000, desiredAccuracyM = 120) {
      if (!("geolocation" in navigator)) {
        const err = new Error("geolocation_not_supported");
        err.code = 2;
        throw err;
      }
      if (!window.isSecureContext) {
        const err = new Error("geolocation_insecure_context");
        err.code = 2;
        throw err;
      }

      const deadline = Date.now() + maxWaitMs;
      const attempts = [
        // Fast warm-up, allows small cache to reduce desktop cold start failures.
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 5000 },
        // Second strict attempt for a fresher and usually more accurate fix.
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 },
      ];

      let best = null;
      let lastError = null;

      for (const options of attempts) {
        const remain = deadline - Date.now();
        if (remain <= 0) break;

        try {
          const position = await requestCurrentPosition({
            ...options,
            timeout: Math.min(options.timeout, remain),
          });
          const normalized = normalizePosition(position);
          if (!best || normalized.accuracy < best.accuracy) {
            best = normalized;
          }
          if (normalized.accuracy <= desiredAccuracyM) {
            return normalized;
          }
        } catch (error) {
          lastError = error;
          if (error?.code === 1) throw error;
        }
      }

      if (best) {
        return best;
      }

      if (lastError && (lastError.code === 2 || lastError.code === 3)) {
        throw lastError;
      }

      const timeoutErr = new Error("geolocation_timeout");
      timeoutErr.code = 3;
      throw timeoutErr;
    }

    async function resolveLocationForMessage() {
      const precise = await Promise.race([
        requestPrecisePosition(35000, 120),
        new Promise((_, reject) => {
          const err = new Error("location_total_timeout");
          err.code = 3;
          setTimeout(() => reject(err), LOCATION_REQUEST_TOTAL_TIMEOUT_MS);
        }),
      ]);
      return { latitude: precise.latitude, longitude: precise.longitude, source: "gps" };
    }

    function supportsVoiceRecording() {
      if (globalThis.AndroidVoiceBridge && typeof globalThis.AndroidVoiceBridge.startVoiceRecording === "function") {

      return !!(

        && typeof navigator.mediaDevices.getUserMedia === "function"

    function getPreferredVoiceMimeType() {
      if (typeof globalThis.MediaRecorder !== "function" || typeof MediaRecorder.isTypeSupported !== "function") {
        return "";
      }

      const mimeTypes = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/mp4",
        "audio/ogg;codecs=opus",
      ];
      return mimeTypes.find((value) => MediaRecorder.isTypeSupported(value)) || "";
    }

    function cleanupVoiceRecordingState() {
      if (voiceRecordingStream) {
        voiceRecordingStream.getTracks().forEach((track) => track.stop());
      }
      nativeVoiceRecording = false;
      voiceMediaRecorder = null;
      voiceRecordingStream = null;
      voiceRecordingChunks = [];
      voiceRecordingStartAt = 0;
      voiceRecordingTargetFriendId = null;
      voiceRecordingSendOnStop = false;

    function cancelVoiceRecording() {
      voiceReadyBlob = null;
      voiceReadyMediaData = "";
      voiceReadyContent = "";
      if (nativeVoiceRecording && globalThis.AndroidVoiceBridge && typeof globalThis.AndroidVoiceBridge.cancelVoiceRecording === "function") {
        try {
          globalThis.AndroidVoiceBridge.cancelVoiceRecording();
        } catch {}
        cleanupVoiceRecordingState();
        return;
      }
      if (voiceMediaRecorder && voiceMediaRecorder.state !== "inactive") {
        voiceRecordingSendOnStop = false;
        try { voiceMediaRecorder.stop(); } catch { cleanupVoiceRecordingState(); }
      } else {
        cleanupVoiceRecordingState();
      }
    }

    function updateVoiceRecordButton() {
      if (!els.voiceRecordBtn) return;
      const recording = nativeVoiceRecording || !!(voiceMediaRecorder && voiceMediaRecorder.state === "recording");
      const ready = !recording && (!!voiceReadyBlob || !!voiceReadyMediaData);
      els.voiceRecordBtn.classList.toggle("active", recording);
      els.voiceRecordBtn.classList.toggle("ready", ready);
      if (recording) {

    }

    async function startVoiceRecording() {
      if (!canComposeMessage()) {
        setChatNotice(t("selectFriendToChat"));
        return;
      }
      if (!supportsVoiceRecording()) {
        setChatNotice(t("microphoneNotSupported"));
        setFriendMsg(t("microphoneNotSupported"));
        return;
      }
      if (voiceMediaRecorder && voiceMediaRecorder.state === "recording") {
        return;
      }

      if (globalThis.AndroidVoiceBridge && typeof globalThis.AndroidVoiceBridge.startVoiceRecording === "function") {
        voiceReadyBlob = null;
        voiceReadyMediaData = "";
        voiceReadyContent = "";
        voiceRecordingTargetFriendId = Number(selectedFriend.id);
        nativeVoiceRecording = true;
        voiceRecordingStartAt = Date.now();
        updateVoiceRecordButton();
        setChatNotice(t("recordingVoice"));
        try {
          globalThis.AndroidVoiceBridge.startVoiceRecording();
        } catch (error) {
          cleanupVoiceRecordingState();
          setChatNotice(t("microphonePermissionDenied", { message: error?.message || t("unknownError") }));
          setFriendMsg(t("microphonePermissionDenied", { message: error?.message || t("unknownError") }));
        }
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        if (!selectedFriend) {
          stream.getTracks().forEach((track) => track.stop());
          return;
        }
        const mimeType = getPreferredVoiceMimeType();
        const recorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);

        voiceRecordingStream = stream;
        voiceMediaRecorder = recorder;
        voiceRecordingChunks = [];
        voiceRecordingStartAt = Date.now();
        voiceRecordingTargetFriendId = Number(selectedFriend.id);
        voiceRecordingSendOnStop = true;

        recorder.addEventListener("dataavailable", (event) => {
          if (event.data && event.data.size > 0) {
            voiceRecordingChunks.push(event.data);
          }
        });

        recorder.addEventListener("stop", () => {
          const durationMs = Math.max(0, Date.now() - voiceRecordingStartAt);
          const shouldBuffer = voiceRecordingSendOnStop;
          const chunks = [...voiceRecordingChunks];
          const finalMimeType = recorder.mimeType || mimeType || "audio/webm";
          cleanupVoiceRecordingState();

          if (!shouldBuffer) return;
          if (durationMs < 500 || !chunks.length) {
            setChatNotice(t("voiceTooShort"));
            setFriendMsg(t("voiceTooShort"));
            return;
          }

          const blob = new Blob(chunks, { type: finalMimeType });
          const seconds = Math.max(1, Math.round(durationMs / 1000));
          voiceReadyBlob = blob;
          voiceReadyContent = t("voiceMessageDuration", { seconds });
          updateVoiceRecordButton();
          setChatNotice(t("voiceReadyToSend"));
        }, { once: true });

        recorder.start();
        updateVoiceRecordButton();
        setChatNotice(t("recordingVoice"));
      } catch (error) {
        cleanupVoiceRecordingState();
        setChatNotice(t("microphonePermissionDenied", { message: error?.message || t("unknownError") }));
        setFriendMsg(t("microphonePermissionDenied", { message: error?.message || t("unknownError") }));
      }
    }

    async function stopVoiceRecording() {
      if (nativeVoiceRecording && globalThis.AndroidVoiceBridge && typeof globalThis.AndroidVoiceBridge.stopVoiceRecording === "function") {
        try {
          globalThis.AndroidVoiceBridge.stopVoiceRecording();
        } catch {
          cleanupVoiceRecordingState();
        }
        return;
      }

      if (!voiceMediaRecorder) return;

      voiceRecordingSendOnStop = true;
      const recorder = voiceMediaRecorder;
      if (recorder.state === "inactive") {
        cleanupVoiceRecordingState();
        return;
      }

      try {
        recorder.stop();
      } catch {
        cleanupVoiceRecordingState();
      }
    }

    function getPendingMessages(friendId) {
      return pendingMessagesByFriend.get(Number(friendId)) || [];
    }

    function addPendingMessage(friendId, payload) {
      const data = (typeof payload === "string")
        ? { content: payload, messageType: "text", mediaData: null, latitude: null, longitude: null }
        : {
            content: payload?.content || "",
            messageType: payload?.messageType || "text",
            mediaData: payload?.mediaData || null,
            latitude: payload?.latitude ?? null,
            longitude: payload?.longitude ?? null,
          };
      const key = Number(friendId);
      const pending = getPendingMessages(key);
      const tempId = `temp-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      pending.push({
        id: tempId,
        sender_id: currentUser.id,
        receiver_id: key,
        content: data.content,
        message_type: data.messageType,
        media_data: data.mediaData,
        latitude: data.latitude,
        longitude: data.longitude,
        created_at: new Date().toISOString(),
        _pending: true,
      });
      pendingMessagesByFriend.set(key, pending);
      return tempId;
    }

    function removePendingMessage(friendId, tempId) {
      const key = Number(friendId);
      const pending = getPendingMessages(key).filter((m) => String(m.id) !== String(tempId));
      if (pending.length) {
        pendingMessagesByFriend.set(key, pending);
      } else {
        pendingMessagesByFriend.delete(key);
      }
    }

    function clearTypingTimers() {
      if (typingSendTimer) {
        clearTimeout(typingSendTimer);
        typingSendTimer = null;
      }
      if (typingClearTimer) {

      }

    function stopTypingIndicatorNow() {
      clearTypingTimers();

    function scheduleTypingUpdate(friendId) {
      if (!currentUser || !selectedFriend) return;
      const targetId = Number(friendId);
      typingTargetFriendId = targetId;

      const pushTyping = () => {
        if (!currentUser || !selectedFriend) return;
        if (Number(selectedFriend.id) !== targetId) return;
        setTyping(targetId)
          .then(() => {
            lastTypingSentAt = Date.now();
          })
          .catch((error) => {
            setFriendMsg(t("typingUpdateFailed", { message: error.message || t("unknownError") }));
          });
      };

      const now = Date.now();
      const elapsed = now - lastTypingSentAt;
      if (elapsed >= TYPING_SEND_MIN_INTERVAL_MS) {
        pushTyping();
      } else {
        if (typingSendTimer) {
          clearTimeout(typingSendTimer);
        }
        typingSendTimer = setTimeout(() => {
          typingSendTimer = null;
          pushTyping();
        }, TYPING_SEND_MIN_INTERVAL_MS - elapsed);
      }

      if (typingClearTimer) {
        clearTimeout(typingClearTimer);
      }
      typingClearTimer = setTimeout(() => {
        if (typingTargetFriendId !== targetId) return;
        stopTypingIndicatorNow();
      }, TYPING_IDLE_CLEAR_MS);
    }

    function applyActiveChatReadState(rows) {
      if (!selectedFriend) return rows || [];
      const activeFriendId = Number(selectedFriend.id);
      return (rows || []).map((friend) => (
        Number(friend.id) === activeFriendId
          ? { ...friend, unread_count: 0 }
          : friend
      ));
    }

    function patchFriendLocal(friendId, patch) {
      latestFriends = latestFriends.map((item) => (
        Number(item.id) === Number(friendId)
          ? { ...item, ...patch }
          : item
      ));
      if (selectedFriend && Number(selectedFriend.id) === Number(friendId)) {
        selectedFriend = { ...selectedFriend, ...patch };
      }
      lastFriendsRenderKey = "";
      renderFriends(latestFriends);
      if (selectedFriend && Number(selectedFriend.id) === Number(friendId)) {
        renderChatStatus(selectedFriend);
      }
    }

    function updateConversationState(friendId, rows) {
      const normalizedRows = Array.isArray(rows) ? rows : [];
      conversationCacheByFriend.set(Number(friendId), normalizedRows);
      currentConversationFriendId = Number(friendId);
      currentConversationRows = normalizedRows;

    function formatTime(v) {
      const d = parseDbTime(v);
      if (!d) return "-";
      return d.toLocaleString(currentLocale(), { hour12: false, timeZone: APP_TIME_ZONE });
    }

    function formatChatListTime(v) {
      const d = parseDbTime(v);
      if (!d) return "";

      const now = new Date();
      const dayDiff = getShanghaiDayNumber(now) - getShanghaiDayNumber(d);
      if (dayDiff === 0) {
        return d.toLocaleTimeString(currentLocale(), {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false,
          timeZone: APP_TIME_ZONE,
        });
      }
      if (dayDiff === 1) return currentLanguage === "en" ? "1d" : "1天";
      if (dayDiff < 7) return currentLanguage === "en" ? `${dayDiff}d` : `${dayDiff}天`;
      return d.toLocaleDateString(currentLocale(), {
        month: "2-digit",
        day: "2-digit",
        timeZone: APP_TIME_ZONE,
      });
    }

    function formatLastSeen(v) {
      if (!v) return t("noOnlineRecord");

      const d = parseDbTime(v);
      if (!d) return t("noOnlineRecord");

      const now = new Date();
      const diffMs = now.getTime() - d.getTime();
      if (diffMs < 0) return formatTime(d);

      const diffSeconds = Math.floor(diffMs / 1000);
      if (diffSeconds < 60) return t("justNow");

      const diffMinutes = Math.floor(diffSeconds / 60);
      if (diffMinutes < 60) return t("minutesAgo", { count: diffMinutes });

      const dayDiff = getShanghaiDayNumber(now) - getShanghaiDayNumber(d);
      const timeText = d.toLocaleTimeString(currentLocale(), {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        timeZone: APP_TIME_ZONE,
      });

      if (dayDiff === 0) return t("todayTime", { time: timeText });
      if (dayDiff === 1) return t("yesterdayTime", { time: timeText });
      if (dayDiff < 7) return t("daysAgo", { count: dayDiff });

      return d.toLocaleString(currentLocale(), {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        timeZone: APP_TIME_ZONE,
      });
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getDefaultAvatarSrc() {
      const icon = document.querySelector('link[rel="icon"]');
      return icon?.href || "";
    }

    function normalizeAvatarData(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (raw.startsWith("data:image/")) return raw;
      if (/^https?:\/\//i.test(raw)) return raw;
      return "";
    }

    function avatarCacheKey(userId) {
      return `${AVATAR_CACHE_PREFIX}${Number(userId || 0)}`;
    }

    function saveAvatarCache(userId, avatarData) {
      if (!userId) return;
      const normalized = normalizeAvatarData(avatarData);
      const key = avatarCacheKey(userId);
      if (!normalized) {
        localStorage.removeItem(key);
        return;
      }
      localStorage.setItem(key, normalized);
    }

    function loadAvatarCache(userId) {
      if (!userId) return "";
      return normalizeAvatarData(localStorage.getItem(avatarCacheKey(userId)) || "");
    }

    function resolveAvatarSrc(user) {
      const fromUser = normalizeAvatarData(user?.avatar_data);
      return fromUser || getDefaultAvatarSrc();
    }

    function updateAccountAvatarPreview() {
      if (!els.accountAvatarPreview) return;
      els.accountAvatarPreview.src = resolveAvatarSrc(currentUser);
    }

    function formatCoordinate(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return "";
      return num.toFixed(6);
    }

    function normalizeImageSrc(rawValue) {
      let raw = String(rawValue || "").trim();
      if (!raw) return "";

      // Handle values accidentally persisted with wrapping quotes.
      if ((raw.startsWith('"') && raw.endsWith('"')) || (raw.startsWith("'") && raw.endsWith("'"))) {
        raw = raw.slice(1, -1);
      }

      // Recover common escaped variants from previous rendering/serialization paths.
      raw = raw
        .replace(/&quot;/g, '"')
        .replace(/\\\//g, "/")
        .replace(/\s+/g, " ")
        .trim();

      if (/^data%3Aimage%2F/i.test(raw)) {
        try {
          raw = decodeURIComponent(raw);
        } catch {}
      }

      if (raw.startsWith("data:image/")) {
        return raw;
      }
      if (/^https?:\/\//i.test(raw)) {
        return raw;
      }

      // Some payloads may include only the part after comma in a data URL.
      if (/^[A-Za-z0-9+/=\r\n]+$/.test(raw)) {
        return `data:image/jpeg;base64,${raw.replace(/\s+/g, "")}`;
      }

      // Fallback for plain base64 payloads persisted without data URL prefix.
      return "";
    }

    function normalizeAudioSrc(rawValue) {
      const raw = String(rawValue || "").trim();
      if (!raw) return "";
      if (raw.startsWith("data:audio/")) return raw;
      if (/^https?:\/\//i.test(raw)) return raw;
      return "";
    }

    function renderMessageBody(message) {
      const type = message.message_type || "text";
      if (type === "image") {
        const src = normalizeImageSrc(message.media_data);
        if (!src) {
          return `<div>${t("imageMessage")} (${t("unknownError")})</div>`;
        }
        return `<img class="bubble-image" src="${src}" alt="${t("imageMessage")}" onerror="this.replaceWith(document.createTextNode('${t("imageMessage")}'))" />`;
      }

      if (type === "audio") {
        const src = normalizeAudioSrc(message.media_data);
        if (!src) {
          return `<div>${escapeHtml(message.content || t("voiceMessage"))}</div>`;
        }
        return `
          <audio class="bubble-audio" controls preload="metadata" src="${src}"></audio>
          <div class="audio-caption">${escapeHtml(message.content || t("voiceMessage"))}</div>
        `;
      }

      if (type === "file") {
        const src = message.media_data || "";
        const filename = escapeHtml(message.content || t("documentMessage"));
        if (!src) return `<div>📎 ${filename}</div>`;
        return `<div class="bubble-file"><span class="file-icon">📎</span><a class="file-link" href="${src}" download="${filename}">${filename}</a></div>`;
      }

      if (type === "location") {
        const lat = Number(message.latitude);
        const lng = Number(message.longitude);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          return `<div>${escapeHtml(message.content || t("locationMessage"))}</div>`;
        }
        const mapUrl = `https://maps.google.com/?q=${lat},${lng}`;
        const label = `${t("locationMessage")}: ${formatCoordinate(lat)}, ${formatCoordinate(lng)}`;
        return `
          <div>${escapeHtml(message.content || label)}</div>
          <a class="location-link" href="${mapUrl}" target="_blank" rel="noopener noreferrer">${t("openMap")}</a>
        `;
      }

      return `<div>${escapeHtml(message.content)}</div>`;
    }

    async function initDatabase() {
      const { error } = await supabase.from("users").select("id", { head: true, count: "exact" }).limit(1);
      if (error) {
        throw new Error("Supabase schema not ready. Please run supabase_users_only_schema.sql (or full schema) first.");
      }

      const { error: avatarError } = await supabase.from("users").select("avatar_data").limit(1);
      if (avatarError) {
        if (isMissingAvatarColumnError(avatarError)) {
          throw new Error("Users.avatar_data column missing. Run: alter table public.users add column if not exists avatar_data text;");
        }
        throw new Error(`Avatar schema check failed: ${avatarError.message || "Unknown error"}`);
      }
    }

    function makeSessionExpiryIso() {
      return new Date(Date.now() + SESSION_TTL_MS).toISOString();
    }

    async function registerUser(username, displayName, password) {
      const now = nowIso();
      const { data, error } = await supabase.from("users").insert({
        username,
        display_name: displayName,
        password,
        created_at: now,
        last_seen_at: now,
      }).select("id").single();
      assertNoDbError(error, "Register failed");

      const newUserId = Number(data?.id || 0);
      if (newUserId) {
        await createFriendshipPair(newUserId, newUserId);
      }
    }

    async function loginUser(username, password) {
      let user = null;
      let error = null;
      ({ data: user, error } = await supabase
        .from("users")
        .select("id, username, display_name, avatar_data")
        .eq("username", username)
        .eq("password", password)
        .eq("is_active", true)
        .maybeSingle());
      if (error && isMissingAvatarColumnError(error)) {
        ({ data: user, error } = await supabase
          .from("users")
          .select("id, username, display_name")
          .eq("username", username)
          .eq("password", password)
          .eq("is_active", true)
          .maybeSingle());
      }
      assertNoDbError(error, "Login failed");
      if (!user) return null;

      const nowIso = new Date().toISOString();
      const { error: updateError } = await supabase
        .from("users")
        .update({ last_login_at: nowIso, last_seen_at: nowIso })
        .eq("id", user.id);
      assertNoDbError(updateError, "Login failed");
      return user;
    }

        .eq("password", currentPassword)

    async function startLoginSession() {
      if (!currentUser || !sessionId) return;
      const nowIso = new Date().toISOString();

      const { error: delError } = await supabase.from("user_sessions").delete().eq("user_id", currentUser.id);
      assertNoDbError(delError, "Session init failed");

      const { error: insError } = await supabase.from("user_sessions").insert({
        session_id: sessionId,
        user_id: currentUser.id,
        login_at: nowIso,
        logout_at: null,
        expires_at: makeSessionExpiryIso(),
        last_seen_at: nowIso,
        created_at: nowIso,
      });
      assertNoDbError(insError, "Session init failed");

      const { error: userError } = await supabase
        .from("users")
        .update({ last_login_at: nowIso, last_seen_at: nowIso })
        .eq("id", currentUser.id);
      assertNoDbError(userError, "Session init failed");
      saveSessionToStorage();
    }

    async function updatePresence() {
      if (!currentUser || !sessionId) return;
      const nowIso = new Date().toISOString();

      const { error: upsertError } = await supabase.from("user_sessions").upsert({
        session_id: sessionId,
        user_id: currentUser.id,
        login_at: nowIso,
        logout_at: null,
        expires_at: makeSessionExpiryIso(),
        last_seen_at: nowIso,
        created_at: nowIso,
      }, { onConflict: "session_id" });
      assertNoDbError(upsertError, "Presence update failed");

      const { error: userError } = await supabase.from("users").update({ last_seen_at: nowIso }).eq("id", currentUser.id);
      assertNoDbError(userError, "Presence update failed");
      saveSessionToStorage();
    }

    async function markOffline() {
      if (!currentUser || !sessionId) return;
      const nowIso = new Date().toISOString();
      try {
        await supabase
          .from("user_sessions")
          .update({ logout_at: nowIso, expires_at: nowIso, last_seen_at: nowIso })
          .eq("session_id", sessionId);
      } catch {}
      try {
        await supabase
          .from("users")
          .update({ last_seen_at: nowIso, typing_to_user_id: null, typing_at: null })
          .eq("id", currentUser.id);
      } catch {}
    }

    async function fetchUserBySession(savedSessionId, savedUserId) {
      const { data: session, error: sessionError } = await supabase
        .from("user_sessions")
        .select("session_id, user_id, logout_at, expires_at")
        .eq("session_id", savedSessionId)
        .eq("user_id", savedUserId)
        .maybeSingle();
      assertNoDbError(sessionError, "Session restore failed");
      if (!session || session.logout_at) return null;
      if (new Date(session.expires_at).getTime() <= Date.now()) return null;

      const { data: user, error: userError } = await supabase
        .from("users")
        .select("id, username, display_name, avatar_data")
        .eq("id", savedUserId)
        .eq("is_active", true)
        .maybeSingle();
      let restoredUser = user;
      let restoredError = userError;
      if (restoredError && isMissingAvatarColumnError(restoredError)) {
        const fallback = await supabase
          .from("users")
          .select("id, username, display_name")
          .eq("id", savedUserId)
          .eq("is_active", true)
          .maybeSingle();
        restoredUser = fallback.data;
        restoredError = fallback.error;
      }
      assertNoDbError(restoredError, "Session restore failed");
      return restoredUser || null;
    }

    async function restoreLoginSession() {
      const saved = loadSessionFromStorage();
      if (!saved) return false;

      const user = await fetchUserBySession(saved.sessionId, saved.userId);
      if (!user) {
        clearSessionFromStorage();
        return false;
      }

      sessionId = saved.sessionId;
      currentUser = user;
      currentUser.avatar_data = normalizeAvatarData(currentUser.avatar_data) || loadAvatarCache(currentUser.id);
      selectedFriend = null;
      activeUtilityPanel = null;
      setAuthMsg("");
      setFriendMsg("");
      setAutoLoginHint("autoLoginBySession");
      setUtilityPanel(null);
      setRequestTab("incoming");
      updateView();
      updateAccountAvatarPreview();
      clearSelectedFriend();
      showFriendsView();

      const cached = loadCachedFriends(currentUser.id);
      if (cached.length) {
        renderFriends(cached);
      }

      createFriendshipPair(currentUser.id, currentUser.id).catch(() => {});
      await updatePresence().catch(() => {});
      requestNotificationPermission().catch(() => {});
      startPolling();
      refreshAll().catch((error) => {
        setFriendMsg(t("refreshFailed", { message: error.message || t("unknownError") }));
      });
      return true;
    }

        clearSessionFromStorage();
        return false;
      }

      await finishLogin(user, saved, "autoLoginByCredentials");
      return true;

    async function createFriendshipPair(a, b) {
      const nowIso = new Date().toISOString();
      const { error } = await supabase.from("friendships").upsert([
        { user_id: a, friend_id: b, created_at: nowIso },
        { user_id: b, friend_id: a, created_at: nowIso },
      ], { onConflict: "user_id,friend_id", ignoreDuplicates: true });
      assertNoDbError(error, "Create friendship failed");
    }

    async function sendFriendRequest(targetUsername) {
      const { data: target, error: targetError } = await supabase
        .from("users")
        .select("id, username, display_name")
        .eq("username", targetUsername)
        .eq("is_active", true)
        .maybeSingle();
      assertNoDbError(targetError, "Send request failed");
      if (!target) {
        return { ok: false, msg: t("userNotFound") };
      }
      if (Number(target.id) === Number(currentUser.id)) {
        return { ok: false, msg: t("cannotAddSelf") };
      }

      const { data: alreadyFriend, error: alreadyFriendError } = await supabase
        .from("friendships")
        .select("id")
        .eq("user_id", currentUser.id)
        .eq("friend_id", target.id)
        .limit(1)
        .maybeSingle();
      assertNoDbError(alreadyFriendError, "Send request failed");
      if (alreadyFriend) {
        return { ok: false, msg: t("alreadyFriends") };
      }

      const { data: reversePending, error: reversePendingError } = await supabase
        .from("friend_requests")
        .select("id")
        .eq("sender_id", target.id)
        .eq("receiver_id", currentUser.id)
        .eq("status", "pending")
        .limit(1)
        .maybeSingle();
      assertNoDbError(reversePendingError, "Send request failed");

      if (reversePending) {
        const { error: acceptError } = await supabase
          .from("friend_requests")
          .update({ status: "accepted", updated_at: new Date().toISOString() })
          .eq("id", reversePending.id);
        assertNoDbError(acceptError, "Send request failed");
        await createFriendshipPair(currentUser.id, target.id);
        return { ok: true, msg: t("autoBecameFriends") };
      }

      const { data: existsPending, error: existsPendingError } = await supabase
        .from("friend_requests")
        .select("id")
        .eq("sender_id", currentUser.id)
        .eq("receiver_id", target.id)
        .eq("status", "pending")
        .limit(1)
        .maybeSingle();
      assertNoDbError(existsPendingError, "Send request failed");

      if (existsPending) {
        return { ok: false, msg: t("requestAlreadySent") };
      }

      const nowIso = new Date().toISOString();
      const { error: insertError } = await supabase.from("friend_requests").insert({
        sender_id: currentUser.id,
        receiver_id: target.id,
        status: "pending",
        created_at: nowIso,
        updated_at: nowIso,
      });
      assertNoDbError(insertError, "Send request failed");

      return { ok: true, msg: t("requestSentTo", { username: target.username }) };
    }

    async function fetchIncomingRequests() {
      const { data: rows, error } = await supabase
        .from("friend_requests")
        .select("id, sender_id, created_at")
        .eq("receiver_id", currentUser.id)
        .eq("status", "pending")
        .order("created_at", { ascending: false });
      assertNoDbError(error, "Fetch requests failed");
      if (!rows || !rows.length) return [];

      const senderIds = [...new Set(rows.map((r) => Number(r.sender_id)))];
      const { data: users, error: userError } = await supabase
        .from("users")
        .select("id, username, display_name")
        .in("id", senderIds);
      assertNoDbError(userError, "Fetch requests failed");
      const userById = new Map((users || []).map((u) => [Number(u.id), u]));

      return rows.map((r) => {
        const u = userById.get(Number(r.sender_id)) || {};
        return {
          id: r.id,
          sender_id: r.sender_id,
          username: u.username || "",
          display_name: u.display_name || t("userDefaultName"),
          created_at: r.created_at,
        };
      });
    }

    async function fetchFriends() {
      const { data: friendships, error: friendError } = await supabase
        .from("friendships")
        .select("friend_id")
        .eq("user_id", currentUser.id);
      assertNoDbError(friendError, "Fetch friends failed");

      const friendIds = [...new Set((friendships || []).map((f) => Number(f.friend_id)))];
      let users = null;
      let usersError = null;
      if (friendIds.length > 0) {
        ({ data: users, error: usersError } = await supabase
          .from("users")
          .select("id, username, display_name, avatar_data, last_seen_at, typing_to_user_id, typing_at")
          .in("id", friendIds));
        if (usersError && isMissingAvatarColumnError(usersError)) {
          ({ data: users, error: usersError } = await supabase
            .from("users")
            .select("id, username, display_name, last_seen_at, typing_to_user_id, typing_at")
            .in("id", friendIds));
        }
      }
      assertNoDbError(usersError, "Fetch friends failed");
      const userById = new Map((users || []).map((u) => [Number(u.id), {
        ...u,
        avatar_data: normalizeAvatarData(u.avatar_data),
      }]));

      let allMsgs = [];
      let msgError = null;
      if (friendIds.length > 0) {
        const orFilter = `and(sender_id.eq.${currentUser.id},receiver_id.in.(${friendIds.join(",")})),and(receiver_id.eq.${currentUser.id},sender_id.in.(${friendIds.join(",")}))`;
        ({ data: allMsgs, error: msgError } = await supabase
          .from("messages")
          .select("id, sender_id, receiver_id, content, message_type, created_at")
          .or(orFilter)
          .order("created_at", { ascending: false })
          .order("id", { ascending: false })
          .limit(5000));
      }
      assertNoDbError(msgError, "Fetch friends failed");

      const latestMsgByFriend = new Map();
      for (const m of (allMsgs || [])) {
        const fid = Number(m.sender_id) === Number(currentUser.id) ? Number(m.receiver_id) : Number(m.sender_id);
        if (!latestMsgByFriend.has(fid)) latestMsgByFriend.set(fid, m);
      }

      let sessions = [];
      let sessionError = null;
      if (friendIds.length > 0) {
        ({ data: sessions, error: sessionError } = await supabase
          .from("user_sessions")
          .select("user_id, logout_at, last_seen_at, login_at")
          .in("user_id", friendIds)
          .order("login_at", { ascending: false }));
      }
      assertNoDbError(sessionError, "Fetch friends failed");
      const latestSessionByFriend = new Map();
      for (const s of (sessions || [])) {
        const fid = Number(s.user_id);
        if (!latestSessionByFriend.has(fid)) latestSessionByFriend.set(fid, s);
      }

      let unreadRows = [];
      let unreadError = null;
      if (friendIds.length > 0) {
        ({ data: unreadRows, error: unreadError } = await supabase
          .from("messages")
          .select("sender_id")
          .eq("receiver_id", currentUser.id)
          .is("read_at", null)
          .in("sender_id", friendIds));
      }
      assertNoDbError(unreadError, "Fetch friends failed");
      const unreadByFriend = new Map();
      for (const r of (unreadRows || [])) {
        const fid = Number(r.sender_id);
        unreadByFriend.set(fid, Number(unreadByFriend.get(fid) || 0) + 1);
      }

      const nowMs = Date.now();
      const rows = (friendships || []).map((f) => {
        const fid = Number(f.friend_id);
        const u = userById.get(fid) || {};
        const m = latestMsgByFriend.get(fid);
        const s = latestSessionByFriend.get(fid);

        let preview = "";
        if (m) {
          if (m.message_type === "image") preview = t("imageLabel");
          else if (m.message_type === "audio") preview = t("voiceLabel");
          else if (m.message_type === "file") preview = t("documentLabel");
          else if (m.message_type === "location") preview = t("locationLabel");
          else preview = m.content || "-";
        }

        const sessionSeenAt = s ? (s.logout_at || s.last_seen_at) : null;
        const isOnline = !!(
          s
          && !s.logout_at
          && s.last_seen_at
          && (nowMs - new Date(s.last_seen_at).getTime()) <= 20000
        );
        const isSelf = Number(fid) === Number(currentUser.id);
        const isTyping = !!(
          Number(u.typing_to_user_id || 0) === Number(currentUser.id)
          && u.typing_at
          && (nowMs - new Date(u.typing_at).getTime()) <= 5000
        );

        return {
          id: fid,
          username: u.username || "",
          display_name: u.display_name || t("userDefaultName"),
          avatar_data: normalizeAvatarData(u.avatar_data),
          last_message_at: (m && m.created_at) || u.last_seen_at || new Date().toISOString(),
          last_message_preview: preview,
          last_seen_at: sessionSeenAt || u.last_seen_at,
          is_online: isSelf ? true : isOnline,
          is_typing: isTyping,
          unread_count: Number(unreadByFriend.get(fid) || 0),
        };
      });

      rows.sort((a, b) => {
        const ta = new Date(a.last_message_at || 0).getTime();
        const tb = new Date(b.last_message_at || 0).getTime();
        if (ta !== tb) return tb - ta;
        return String(a.display_name || a.username).localeCompare(String(b.display_name || b.username));
      });
      return rows;
    }
